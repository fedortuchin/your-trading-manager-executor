name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/fedortuchin/your-trading-manager-executor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Lint shell scripts
        run: |
          bash -n scripts/build_artifact.sh
          bash -n scripts/install.sh
          bash -n scripts/install-venv.sh
          bash -n scripts/sign_artifact.sh

      - name: Python lint
        run: uv run ruff check .

      - name: Python tests
        run: uv run pytest

      - name: Build deterministic wheel
        run: scripts/build_artifact.sh

      - name: Build Docker image locally
        run: docker build -t ytm-executor:test .

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  image:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Build deterministic wheel
        run: scripts/build_artifact.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM artifact
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: dist/ytm-executor-image.spdx.json

      - name: Refresh artifact checksums
        run: |
          cd dist
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
