name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest
      - run: scripts/build_artifact.sh
